llm:
  max_tokens: 4096

timeouts:
  default: 30
  analysis: 60
  fast: 10

tools:
  strings_min_length: "4"
  hexdump_default_bytes: "256"

routing:
  embedding_model: "all-MiniLM-L6-v2"
  embedding_threshold: 0.35
  default_toolsets:
    - file_io
    - shell
  toolset_descriptions:
    analysis: "reverse engineering binary analysis disassembly executable symbols objdump strings hexdump elf shared library segments sections"
    file_io: "read write files directories search filesystem copy move delete create list walk directory contents"
    crypto: "hash encode decode encrypt decrypt base64 xor md5 sha checksum hex bytes cryptography"
    shell: "run execute bash shell command terminal subprocess script process environment"
    web: "http https url fetch request api endpoint website webpage scrape browse read article blog paper curl html rest"
    data: "dataframe pandas csv tsv parquet json jsonpath regex diff template jinja transform aggregate join filter"
    artifacts: "artifact memory store retrieve list metadata expel persist intermediate results"
    search: "search web news images brave api look up find information current events articles google"
    git: "git commit branch diff log blame stash show status working tree repository history who changed"
    document: "pdf docx word epub ebook document extract text pages read pdf read document"

agent:
  system_prompt: >-
    You are a helpful assistant with access to tools for file system operations,
    shell execution, binary analysis, cryptanalysis, web access, web search,
    data processing, document reading, git introspection, and artifact memory management.
    Use these tools when needed to answer the user's questions.
    You can fetch web pages using read_url, search the web using web_search,
    make HTTP API requests using http_request, and extract structured data from HTML using extract_html.
    When the user provides a URL or asks about a web page, article, or online resource,
    use read_url to fetch it — do not say you lack internet access.
    When the user asks you to search for something without providing a URL,
    use web_search to find relevant results.
    You can read PDF files with read_pdf, Word documents with read_docx, and EPUBs with read_epub.
    You can inspect git repositories with git_status, git_log, git_diff, git_show, and git_blame.
    When given a path to inspect, never assume it is a directory — paths without
    extensions are often executables or binaries. Always use file_info first to
    determine what the path is before deciding how to analyze it.

artifact_store:
  enabled: true
  inline_threshold_bytes: 4096
  decay:
    enabled: true
    factor: 0.85
    archive_threshold: 0.1
  workflow_discovery:
    enabled: true
    lookback_days: 30
    similarity_threshold: 0.82
    frequency_threshold: 5
    recency_decay: 0.95
  rag:
    enabled: true
    top_k: 3
    similarity_threshold: 0.6
    inject_on_start: true
    max_injected_chars: 3000
  sqlite_vec:
    enabled: true
    extension_path: null
  project:
    enabled: true
    default: null

planning:
  enabled: true
  model: null
  max_steps: 12
  retry_on_invalid: true

runtime:
  intent_classifier:
    enabled: true
    context_window: 6
  plan_validator:
    enabled: true
  plan_critic:
    enabled: true
    skip_low_risk: true
    consensus_on_high_risk: true
  execution_monitor:
    enabled: true
    max_step_retries: 2
    max_defers_per_step: 1
    step_max_tool_calls: 10
    error_recovery_clears_step_error: true
  context_manager:
    enabled: true
    message_budget_tokens: 16384
    half_life_turns: 10
    threshold_high: 0.45
    threshold_mid: 0.25
    compressed_max_chars: 300

  # Council: multi-agent deliberation primitive.
  # same-provider N times  → variance/noise reduction (self-consistency)
  # different providers    → epistemic independence (different training, priors)
  # mixed N+M              → both; labels distinguish councillors in logs/metrics
  council:
    councillors:

      - provider: ollama
        model: mistral-nemo
        label: gpt
      - provider: anthropic
        model: claude-haiku-4-5
        label: claude
      - provider: grok
        model: grok-3-mini
        label: grok

    mode: independent   # independent | debate

    debate:
      max_rounds: 3
      early_exit_on_consensus: true

    # null = one worker per councillor (fully parallel); 1 = sequential (debug only)
    max_workers: null

    # Fraction of councillors that must challenge a step to keep suggestion at full strength.
    # Below threshold → downgrade one level (drop→replace, replace→justify, justify→discard)
    # Lone wolf (1 of N>2) → floor at justify regardless of suggestion
    consensus_threshold: 0.60

    # Dynamic scaling: number of councillors (from the pool above, in order) per risk level.
    # low=0 bypasses the council entirely; moderate=1 uses only the first councillor;
    # high=3 uses the full pool for maximum epistemic diversity.
    dynamic_scaling:
      low: 0
      moderate: 1
      high: 1
