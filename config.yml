llm:
  max_tokens: 8096
  # Main agent LLM — the model that handles user turns and executes plans.
  # Keys stay in .env; only provider name and model go here.
  provider: gemini  # openai
  model: gemini-2.5-flash # gpt-4.1

  # Runtime LLM — used by classifier, monitor, importance scorer, council calls.
  # Keep this lighter/cheaper than the main model. null = use main provider.
  runtime_provider: anthropic
  runtime_model: claude-haiku-4-5

timeouts:
  default: 30
  analysis: 60
  fast: 10

tools:
  strings_min_length: "4"
  hexdump_default_bytes: "256"
  radare2:
    timeout_seconds: 30
  ghidra:
    project_dir: "_store/ghidra_projects"
    timeout_seconds: 120
    scripts_dir: "src/tools/implementations/reversing/ghidra_scripts"
  angr:
    timeout_reachable: 60
    timeout_solve: 120
    timeout_constraints: 120
    timeout_explore: 300
    complexity_medium_threshold: 50
    complexity_large_threshold: 200

routing:
  embedding_model: "all-MiniLM-L6-v2"
  embedding_threshold: 0.35
  default_toolsets:
    - file_io
    - shell
  toolset_descriptions:
    analysis: "binary recon triage file type identify architecture security features checksec nx aslr stack canary raw disassembly bytes hexdump symbol table nm strings extract initial scan lightweight quick"
    reversing: "decompile function pseudocode radare2 r2 ghidra call graph xref cross-reference what functions exist what calls what structural analysis full function listing understand program decompiled C"
    symbolic: "symbolic execution angr reachable reach path find input solve password key checksum constraint prove buffer overflow vulnerable sink test case generate input trigger behavior what conditions"
    file_io: "read write files directories search filesystem copy move delete create list walk directory contents"
    crypto: "hash encode decode encrypt decrypt base64 xor md5 sha checksum hex bytes cryptography"
    shell: "run execute bash shell command terminal subprocess script process environment"
    web: "http https url fetch request api endpoint website webpage scrape browse read article blog paper curl html rest"
    data: "dataframe pandas csv tsv parquet json jsonpath regex diff template jinja transform aggregate join filter"
    artifacts: "artifact memory store retrieve list metadata expel persist intermediate results"
    search: "search web news images brave api look up find information current events articles google"
    git: "git commit branch diff log blame stash show status working tree repository history who changed"
    document: "pdf docx word epub ebook document extract text pages read pdf read document"
    container: "differential testing docker podman container run binary oracle candidate compare behavior verify reconstruction iterate fix round-trip fuzz edge cases compile source native binary dynamic analysis behavioral equivalence test clone"

agent:
  system_prompt: >-
    You are a helpful assistant with access to tools for file system operations,
    shell execution, binary analysis, cryptanalysis, web access, web search,
    data processing, document reading, git introspection, and artifact memory management.
    Use these tools when needed to answer the user's questions.
    You can fetch web pages using read_url, search the web using web_search,
    make HTTP API requests using http_request, and extract structured data from HTML using extract_html.
    When the user provides a URL or asks about a web page, article, or online resource,
    use read_url to fetch it — do not say you lack internet access.
    When the user asks you to search for something without providing a URL,
    use web_search to find relevant results.
    You can read PDF files with read_pdf, Word documents with read_docx, and EPUBs with read_epub.
    You can inspect git repositories with git_status, git_log, git_diff, git_show, and git_blame.
    When given a path to inspect, never assume it is a directory — paths without
    extensions are often executables or binaries. Always use file_info first to
    determine what the path is before deciding how to analyze it.
    Never use bash_exec to call the 'file' command — use the file_info tool instead.
    file_info runs on the host and is always available; 'file' is not installed in
    the bash sandbox and will fail.
    To find a binary/executable in the project: use walk_directory to list all files,
    then call file_info on candidates that have no common text extension (.py, .md,
    .txt, .json, .log, .jsonl, .yaml, .yml, .toml, .sh). Do NOT use bash_exec with
    'find -executable' — that returns files with the execute bit set, which includes
    log files and scripts, not just native binaries. Do NOT use 'file' in bash_exec.
    IMPORTANT — you have bash_exec and you must use it proactively.
    When you write a script or program, always test it before reporting it done.
    Use bash_exec to set up a temporary environment, install dependencies, run
    the code, and verify the output. A typical test workflow is:
    cd /tmp && python3 -m venv test_env && source test_env/bin/activate &&
    pip install <deps> && python3 <script> <args>.
    Never claim you cannot execute or test code — you have bash_exec for exactly this.
    If bash_exec is blocked by a guard escalation, ask the user to approve it.
    For reverse engineering tasks, always surface any magic constants found in the
    disassembly (e.g. 0x9e3779b9 = TEA, 0x6a09e667 = SHA-256, 0x67452301 = MD5)
    and use them to identify the algorithm before concluding it is unknown.

storage:
  # Local dev: leave empty. GCS: "gs://your-bucket-name"
  base_uri: ""

rag:
  enabled: true          # set true after: pip install lancedb
  mode: local             # local | http
  http_base_url: "http://localhost:17433"   # used when mode=http
  embedding_provider: sentence_transformers  # sentence_transformers | openai | gemini
  embedding_model: all-MiniLM-L6-v2
  top_k: 5
  threshold: 0.65
  injection_budget_chars: 2000

artifact_store:
  enabled: true
  inline_threshold_bytes: 8192
  decay:
    enabled: true
    factor: 0.85
    archive_threshold: 0.1
  workflow_discovery:
    enabled: true
    lookback_days: 30
    similarity_threshold: 0.82
    frequency_threshold: 5
    recency_decay: 0.95
  sqlite_vec:
    enabled: true
    extension_path: null
  project:
    enabled: true
    default: null

planning:
  enabled: true
  model: null
  max_steps: 12
  retry_on_invalid: true

runtime:
  events:
    enabled: true
    jsonl_enabled: true
    directory: "_events"
    raw_payloads: false
    redact_on_emit: false
    redact_on_export: true

  sandbox:
    backend: "auto"
    allow_host_backend: true
    docker_image: "python:3.11-slim"
    default_network: "disabled"
    command_timeout_seconds: 120
    max_output_chars: 20000
    workspace_root: "."
    allowed_read_roots:
      - "/tmp"
      - "/private/tmp"
      - "_store"
      - "."
    allowed_write_roots:
      - "/tmp"
      - "/private/tmp"
      - "_store"
      - "."

  pipeline:
    max_retries_per_stage: 2
    max_ask_user_per_stage: 1
    max_tool_calls: 15
    max_iterations: 20
    max_consecutive_errors: 3
    tool_result_truncate_chars: 20000

  plan_validator:
    enabled: true
  plan_critic:
    enabled: true
    skip_low_risk: false
    consensus_on_high_risk: true
    complexity_threshold: 8

  tool_policy:
    utility_tools:
      write_file:
        - make_directory
      bash_exec:
        - read_file

  continuation:
    enabled: true
    max_iterations: 8
    use_llm_judge: false     # on by default only for skills with CompletionCriteria
    trust_skill_criteria: true
    llm_judge_label: "ContinuationStage"
  execution_monitor:
    enabled: true
    max_step_retries: 2
    max_defers_per_step: 1
    step_max_tool_calls: 30
    step_max_iterations: 25
    error_recovery_clears_step_error: true
  context_manager:
    enabled: true
    message_budget_tokens: 65536
    half_life_turns: 15
    threshold_high: 0.35
    threshold_mid: 0.20
    compressed_max_chars: 800

  # Council: multi-agent deliberation primitive.
  # same-provider N times  → variance/noise reduction (self-consistency)
  # different providers    → epistemic independence (different training, priors)
  # mixed N+M              → both; labels distinguish councillors in logs/metrics
  council:
    councillors:
      - provider: gemini
        model: gemini-2.5-flash
        label: gemini
      - provider: anthropic
        model: claude-haiku-4-5
        label: claude
      - provider: grok
        model: grok-4-1-fast-reasoning
        label: grok
      # - provider: openai
      #   model: gpt-4o-mini
      #   label: gpt



    mode: independent   # independent | debate

    debate:
      max_rounds: 2
      early_exit_on_consensus: true

    # null = one worker per councillor (fully parallel); 1 = sequential (debug only)
    max_workers: null

    # Fraction of councillors that must challenge a step to keep suggestion at full strength.
    # Below threshold → downgrade one level (drop→replace, replace→justify, justify→discard)
    # Lone wolf (1 of N>2) → floor at justify regardless of suggestion
    consensus_threshold: 0.60

    # Dynamic scaling: number of councillors (from the pool above, in order) per risk level.
    # low=0 bypasses the council entirely for simple read-only queries.
    # moderate=3 uses all councillors so debate fires on any write/analysis task.
    # high=3 uses the full pool for destructive or out-of-workspace operations.
    dynamic_scaling:
      low: 0
      moderate: 1
      high: 1

  # ── Optional councils for specific decision points ─────────────────────────
  # Each is independent of the plan_critic council above.
  # Set enabled: true to activate. n_councillors is taken from the top of the
  # council.councillors pool in order.

  monitor_council:
    # Council vote on step-result assessment when single-model confidence < threshold.
    # Replaces the ExecutionMonitor LLM call for uncertain decisions only.
    enabled: false
    confidence_threshold: 0.65  # trigger when monitor confidence < this value
    n_councillors: 2             # use first 2 councillors from the pool

  synthesis_quality:
    # Council quality gate on synthesized responses after plans with failures.
    # Only runs when the plan had at least one RETRY or REPLAN event.
    enabled: false
    only_after_failures: true
    n_councillors: 2

  importance_council:
    # Council vote on step-result importance when single-model scores it MEDIUM.
    # MEDIUM is the ambiguous middle tier — worth a second opinion.
    enabled: false
    only_on_medium: true
    n_councillors: 2

container:
  limits:
    timeout_seconds: 60
    memory: "256m"
    cpus: 1.0
    pids_limit: 64
    network: "none"
  images:
    native: "gcc:12"
    jvm: "openjdk:17-slim"
    python: "python:3.11-slim"
    base: "ubuntu:22.04"
